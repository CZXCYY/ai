<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧠 AI思维测试 · 灵魂画像</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #080810; color: #f1f5f9; min-height: 100vh; overflow-x: hidden; }
    .bg-gradient { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(ellipse at 30% 0%, rgba(99,102,241,0.18) 0%, transparent 50%), radial-gradient(ellipse at 70% 100%, rgba(139,92,246,0.12) 0%, transparent 45%); pointer-events: none; z-index: 0; }
    .container { position: relative; z-index: 1; max-width: 520px; margin: 0 auto; padding: 20px 16px; min-height: 100vh; }
    
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .logo { font-size: 15px; font-weight: 600; background: linear-gradient(135deg, #6366f1, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .step-badge { font-size: 12px; color: #64748b; background: rgba(255,255,255,0.05); padding: 4px 12px; border-radius: 20px; }
    
    .progress-wrap { margin-bottom: 28px; }
    .progress-track { height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
    .progress-thumb { height: 100%; background: linear-gradient(90deg, #6366f1, #8b5cf6); border-radius: 2px; transition: width 0.4s ease; width: 0%; }
    .progress-dots { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap; }
    .p-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.12); transition: all 0.3s; }
    .p-dot.done { background: #10b981; }
    .p-dot.active { background: #6366f1; width: 18px; border-radius: 3px; }
    
    .hero { text-align: center; padding: 36px 0 28px; }
    .hero-icon { font-size: 68px; margin-bottom: 16px; }
    .hero h1 { font-size: 30px; font-weight: 700; background: linear-gradient(135deg, #6366f1, #a78bfa, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
    .hero p { color: #94a3b8; font-size: 15px; line-height: 1.7; }
    
    .intro-card { background: rgba(30,41,59,0.5); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.07); border-radius: 20px; padding: 22px; margin-bottom: 20px; }
    .intro-card h3 { font-size: 13px; color: #64748b; margin-bottom: 14px; }
    .dim-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .dim-item { background: rgba(99,102,241,0.07); border: 1px solid rgba(99,102,241,0.12); border-radius: 12px; padding: 12px 10px; text-align: center; }
    .dim-icon { font-size: 20px; margin-bottom: 4px; }
    .dim-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
    .dim-desc { font-size: 11px; color: #64748b; }
    
    .start-btn { display: block; width: 100%; padding: 17px; background: linear-gradient(135deg, #6366f1, #7c3aed); border: none; border-radius: 14px; font-size: 16px; font-weight: 600; color: white; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 22px rgba(99,102,241,0.35); letter-spacing: 0.5px; }
    .start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(99,102,241,0.45); }
    .note { text-align: center; color: #475569; font-size: 12px; margin-top: 14px; }
    
    .history-section { margin-top: 28px; }
    .history-title { font-size: 12px; color: #64748b; margin-bottom: 10px; }
    .history-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; background: rgba(30,41,59,0.35); border: 1px solid rgba(255,255,255,0.04); border-radius: 10px; margin-bottom: 7px; font-size: 13px; }
    .history-info { display: flex; align-items: center; gap: 10px; color: #94a3b8; }
    .history-date { color: #475569; font-size: 11px; }
    .history-del { color: #ef4444; cursor: pointer; opacity: 0.6; font-size: 12px; }
    .history-del:hover { opacity: 1; }
    
    #privacyModal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
    #privacyModal.hidden { display: none; }
    .modal-box { background: #1e293b; border: 1px solid rgba(255,255,255,0.1); border-radius: 22px; padding: 26px; max-width: 420px; width: 100%; max-height: 82vh; overflow-y: auto; }
    .modal-box h2 { font-size: 19px; margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
    .modal-content { background: #0f172a; border-radius: 14px; padding: 16px; margin-bottom: 18px; max-height: 260px; overflow-y: auto; font-size: 13px; line-height: 1.8; color: #94a3b8; }
    .modal-content h3 { color: #e2e8f0; font-size: 13px; margin: 12px 0 5px; }
    .modal-content h3:first-child { margin-top: 0; }
    .modal-content p { margin-bottom: 6px; }
    .modal-btns { display: flex; gap: 10px; }
    .modal-btns button { flex: 1; padding: 13px; border: none; border-radius: 11px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-cancel { background: rgba(255,255,255,0.07); color: #94a3b8; }
    .btn-accept { background: linear-gradient(135deg, #6366f1, #7c3aed); color: white; }
    
    .question-section { animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .question-card { background: rgba(30,41,59,0.45); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.06); border-radius: 20px; padding: 22px; margin-bottom: 20px; }
    .question-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .q-type-tag { background: rgba(99,102,241,0.15); color: #818cf8; padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .q-dim { font-size: 11px; color: #64748b; }
    .question-text { font-size: 16px; line-height: 1.8; color: #f1f5f9; margin-bottom: 20px; white-space: pre-line; }
    .question-hint { font-size: 12px; color: #64748b; margin-top: 10px; font-style: italic; }
    
    .tf-options { display: flex; gap: 10px; }
    .tf-btn { flex: 1; padding: 18px 12px; background: rgba(15,23,42,0.5); border: 2px solid rgba(255,255,255,0.08); border-radius: 14px; text-align: center; cursor: pointer; transition: all 0.25s; }
    .tf-btn:hover { border-color: rgba(99,102,241,0.4); background: rgba(99,102,241,0.06); }
    .tf-btn.selected { border-color: #6366f1; background: rgba(99,102,241,0.12); }
    .tf-icon { font-size: 28px; margin-bottom: 6px; display: block; }
    .tf-label { font-size: 14px; font-weight: 600; }
    .tf-desc { font-size: 11px; color: #64748b; margin-top: 2px; }
    
    .options { display: flex; flex-direction: column; gap: 8px; }
    .option { display: flex; align-items: center; gap: 12px; padding: 14px; background: rgba(15,23,42,0.5); border: 2px solid rgba(255,255,255,0.06); border-radius: 13px; cursor: pointer; transition: all 0.25s; }
    .option:hover { border-color: rgba(99,102,241,0.35); background: rgba(99,102,241,0.04); }
    .option.selected { border-color: #6366f1; background: rgba(99,102,241,0.1); }
    .opt-radio { width: 20px; height: 20px; border: 2px solid #475569; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .option.selected .opt-radio { border-color: #6366f1; background: #6366f1; }
    .option.selected .opt-radio::after { content: ''; width: 7px; height: 7px; background: white; border-radius: 50%; }
    .opt-label { width: 24px; height: 24px; background: rgba(255,255,255,0.05); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #64748b; flex-shrink: 0; }
    .option.selected .opt-label { background: rgba(99,102,241,0.2); color: #818cf8; }
    .opt-text { font-size: 14px; line-height: 1.5; flex: 1; }
    
    /* 排序题 - 移动端适配 */
    .sort-items { display: flex; flex-direction: column; gap: 8px; }
    .sort-item { display: flex; align-items: center; gap: 10px; padding: 14px 12px; background: rgba(15,23,42,0.5); border: 2px solid rgba(255,255,255,0.06); border-radius: 12px; transition: all 0.2s; user-select: none; }
    .sort-item:active { background: rgba(99,102,241,0.08); }
    .sort-num { width: 28px; height: 28px; background: rgba(99,102,241,0.15); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #818cf8; flex-shrink: 0; }
    .sort-text { font-size: 14px; flex: 1; line-height: 1.4; }
    .sort-btns { display: flex; flex-direction: column; gap: 4px; }
    .sort-btn { width: 24px; height: 24px; background: rgba(99,102,241,0.15); border: none; border-radius: 6px; color: #818cf8; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .sort-btn:hover { background: rgba(99,102,241,0.3); }
    .sort-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .sort-hint { font-size: 12px; color: #64748b; margin-top: 12px; }
    .sort-confirm-btn { display: block; width: 100%; margin-top: 16px; padding: 14px; background: linear-gradient(135deg, #6366f1, #7c3aed); border: none; border-radius: 12px; font-size: 14px; font-weight: 600; color: white; cursor: pointer; }
    
    .nav-row { display: flex; gap: 10px; margin-top: 20px; }
    .nav-btn { flex: 1; padding: 14px; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.25s; }
    .nav-prev { background: rgba(255,255,255,0.07); color: #94a3b8; }
    .nav-prev:hover { background: rgba(255,255,255,0.1); }
    .nav-prev:disabled { opacity: 0.3; cursor: not-allowed; }
    .nav-next { background: linear-gradient(135deg, #6366f1, #7c3aed); color: white; }
    .nav-next:hover { opacity: 0.9; }
    
    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #10b981; color: white; padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 500; z-index: 2000; animation: toastIn 0.3s ease; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    
    /* 结果页 */
    .result-card { background: rgba(30,41,59,0.5); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.07); border-radius: 22px; padding: 26px; margin-bottom: 20px; text-align: center; }
    .result-type-icon { font-size: 72px; margin-bottom: 12px; }
    .result-type-name { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, #6366f1, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 4px; }
    .result-type-en { font-size: 13px; color: #64748b; margin-bottom: 16px; }
    .result-desc { font-size: 14px; color: #94a3b8; line-height: 1.8; margin-bottom: 20px; }
    .result-score { display: inline-flex; align-items: center; gap: 8px; background: rgba(99,102,241,0.1); padding: 8px 18px; border-radius: 20px; font-size: 13px; color: #a5b4fc; }
    .result-score span { font-size: 20px; font-weight: 700; color: #818cf8; }
    
    .radar-card { background: rgba(30,41,59,0.5); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.07); border-radius: 22px; padding: 26px; margin-bottom: 20px; }
    .radar-title { font-size: 13px; color: #64748b; margin-bottom: 16px; text-align: center; }
    .radar-canvas { width: 100%; max-width: 280px; margin: 0 auto; display: block; }
    .radar-legend { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #94a3b8; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
    
    .ability-list { margin-top: 16px; }
    .ability-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .ability-item:last-child { border-bottom: none; }
    .ability-icon { font-size: 18px; }
    .ability-info { flex: 1; }
    .ability-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .ability-bar { height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
    .ability-fill { height: 100%; border-radius: 2px; transition: width 1s ease; }
    .ability-pct { font-size: 12px; color: #64748b; width: 35px; text-align: right; }
    
    .super-section { background: rgba(99,102,241,0.06); border: 1px solid rgba(99,102,241,0.12); border-radius: 16px; padding: 18px; margin-bottom: 18px; }
    .super-label { font-size: 11px; color: #818cf8; margin-bottom: 6px; font-weight: 600; }
    .super-text { font-size: 13px; color: #a5b4fc; line-height: 1.6; }
    
    .result-section { margin-top: 20px; }
    .result-section h3 { font-size: 12px; color: #64748b; margin-bottom: 12px; }
    .result-section h3::before { content: '// '; }
    
    .advantage-item { background: rgba(16,185,129,0.06); border: 1px solid rgba(16,185,129,0.1); border-radius: 12px; padding: 14px; margin-bottom: 10px; font-size: 13px; line-height: 1.6; color: #6ee7b7; }
    .suggest-item { background: rgba(245,158,11,0.06); border: 1px solid rgba(245,158,11,0.1); border-radius: 12px; padding: 14px; margin-bottom: 10px; font-size: 13px; line-height: 1.6; color: #fcd34d; }
    
    .share-card { background: rgba(30,41,59,0.5); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.07); border-radius: 18px; padding: 18px; margin-bottom: 16px; text-align: center; }
    .share-title { font-size: 12px; color: #64748b; margin-bottom: 12px; }
    .share-canvas { width: 100%; max-width: 280px; margin: 0 auto; border-radius: 12px; }
    
    .action-btns { display: flex; gap: 10px; margin-top: 16px; }
    .action-btn { flex: 1; padding: 14px; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.25s; }
    .btn-share { background: linear-gradient(135deg, #10b981, #059669); color: white; }
    .btn-restart { background: rgba(255,255,255,0.07); color: #94a3b8; }
    
    .code-section { background: rgba(99,102,241,0.08); border: 1px solid rgba(99,102,241,0.15); border-radius: 14px; padding: 16px; margin-top: 18px; }
    .code-title { font-size: 12px; color: #818cf8; margin-bottom: 10px; font-weight: 600; }
    .code-input { width: 100%; padding: 12px; background: rgba(15,23,42,0.5); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; color: #f1f5f9; font-size: 14px; text-align: center; letter-spacing: 2px; margin-bottom: 10px; box-sizing: border-box; }
    .code-input:focus { outline: none; border-color: #6366f1; }
    .code-btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #6366f1, #7c3aed); border: none; border-radius: 10px; color: white; font-size: 13px; font-weight: 600; cursor: pointer; }
    
    .unlock-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(8,8,16,0.95); backdrop-filter: blur(20px); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .unlock-overlay.hidden { display: none; }
    .unlock-box { background: #1e293b; border: 1px solid rgba(255,255,255,0.1); border-radius: 22px; padding: 28px; max-width: 380px; width: 100%; text-align: center; }
    .unlock-icon { font-size: 48px; margin-bottom: 14px; }
    .unlock-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .unlock-desc { font-size: 13px; color: #64748b; margin-bottom: 18px; line-height: 1.6; }
    .unlock-price { font-size: 28px; font-weight: 700; color: #f59e0b; margin-bottom: 16px; }
    .unlock-btn { display: block; width: 100%; padding: 14px; background: linear-gradient(135deg, #f59e0b, #d97706); border: none; border-radius: 12px; font-size: 14px; font-weight: 600; color: white; cursor: pointer; margin-bottom: 10px; }
    .unlock-btn-secondary { display: block; width: 100%; padding: 12px; background: rgba(255,255,255,0.06); border: none; border-radius: 12px; font-size: 13px; color: #94a3b8; cursor: pointer; }
    
    @media (max-width: 380px) {
      .hero h1 { font-size: 26px; }
      .result-type-name { font-size: 24px; }
      .tf-btn { padding: 14px 8px; }
      .tf-icon { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="container" id="app"></div>
  <div id="privacyModal">
    <div class="modal-box">
      <h2>🔒 隐私协议</h2>
      <div class="modal-content">
        <h3>数据收集</h3>
        <p>本测试仅收集你主动提交的回答数据，用于生成测试结果。</p>
        <p>数据存储在你的本地设备中，不会自动上传至任何服务器。</p>
        <h3>历史记录</h3>
        <p>你的测试记录保存在浏览器本地存储中，可随时手动删除。</p>
        <h3>分享内容</h3>
        <p>生成的分享图片仅包含测试结果，不包含任何个人信息。</p>
        <h3>第三方服务</h3>
        <p>如使用付费解锁功能，支付由第三方支付平台处理，我们不会存储你的支付信息。</p>
      </div>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="declinePrivacy()">暂不开始</button>
        <button class="btn-accept" onclick="acceptPrivacy()">我已知晓</button>
      </div>
    </div>
  </div>

<script>
// ============ 题库 ============
// dim: 0=逻辑 1=表达 2=AI协作 3=创意
// qType: choice/tf/sort
// 每道题都有 tags 用于类型判定

const questionBank = {
  // ========== 选择题库（12道，每维度3道） ==========
  // 设计原则：情境具体、选项差异大、无重复模式
  choice: [
    // --- 逻辑推理 (dim:0) ---
    {
      id:'c1', dim:0,
      text:'你负责策划公司年会，面对众口难调，你会？',
      options:[
        '先发问卷收集需求，用数据决策',
        '直接定下方案，有问题再调整',
        '找几个核心同事头脑风暴',
        '让各部门自己报方案，统一筛选'
      ],
      tags:['数据驱动','果断决策','群体智慧','授权型']
    },
    {
      id:'c2', dim:0,
      text:'网购时看到两个相似商品，A销量高但评价一般，B销量低但好评如潮，你会？',
      options:[
        '仔细对比两个商品的具体参数',
        '选A，相信多数人的选择',
        '选B，相信真实评价',
        '两个都不选，继续找更好的'
      ],
      tags:['分析型','从众型','口碑型','挑剔型']
    },
    {
      id:'c3', dim:0,
      text:'旅行前做攻略，你更倾向于？',
      options:[
        '精确到每小时的详细计划',
        '只定下必去的几个点，其他随缘',
        '看一堆别人的攻略，然后选一个跟着走',
        '不做计划，到当地再说'
      ],
      tags:['计划周密','抓大放小','参考型','随性型']
    },
    {
      id:'c4', dim:0,
      text:'你家的书桌整理方式是？',
      options:[
        '按类别分类，排列整齐',
        '随手放，用的时候能找到就行',
        '定期全部清空重新整理',
        '东西多又乱，懒得整理'
      ],
      tags:['条理型','整洁型','周期型','极简型']
    },
    // --- 语言表达 (dim:1) ---
    {
      id:'c5', dim:1,
      text:'你发朋友圈的动力来源是？',
      options:[
        '记录生活，以后翻看',
        '希望获得认可和点赞',
        '分享有价值的内容帮到别人',
        '纯粹是手滑点了发送'
      ],
      tags:['记录型','互动型','价值型','即兴型']
    },
    {
      id:'c6', dim:1,
      text:'同事向你吐槽工作烦恼，你通常怎么回应？',
      options:[
        '先听他说完，再分析问题给建议',
        '跟着一起吐槽，表达共鸣',
        '岔开话题，聊点轻松的',
        '默默听着，偶尔回应一下'
      ],
      tags:['分析建议','情感共鸣','转移话题','沉默陪伴']
    },
    {
      id:'c7', dim:1,
      text:'写工作汇报时，你更关注？',
      options:[
        '用数据展示成果，有说服力',
        '说清楚问题和解决方案',
        '突出自己的贡献和亮点',
        '简洁明了，一页纸搞定'
      ],
      tags:['数据型','问题型','成就型','精炼型']
    },
    {
      id:'c8', dim:1,

// ============ 工具函数 ============
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

    questions: state.questions,

}

      state.answers = s.answers || {};

      state.result = s.result;

}

// ============ 生成测试 ============
function generateTest() {
  const choiceCnt = 8;
  const tfCnt = 6;
  const sortCnt = 1;
  
  // 每维度至少抽1道选择
  const dimCount = [0,0,0,0];
  let choiceSelected = [];
  
  // 先保证每维度至少1道
  for (let d = 0; d < 4; d++) {
    const dimChoices = questionBank.choice.filter(q => q.dim === d);
    const picked = shuffle(dimChoices)[0];
    choiceSelected.push({...picked, realId: picked.id + '_' + Date.now()});
    dimCount[d]++;
  }
  
  // 再随机选剩下的
  const remainingChoices = questionBank.choice.filter(q => !choiceSelected.find(s => s.id === q.id));
  const extraChoices = shuffle(remainingChoices).slice(0, choiceCnt - 4);
  extraChoices.forEach(q => {
    choiceSelected.push({...q, realId: q.id + '_' + Date.now()});
    dimCount[q.dim]++;
  });
  
  // 打乱顺序
  choiceSelected = shuffle(choiceSelected);
  
  // 判断题：每维度选一些
  let tfSelected = [];
  const tfPerDim = [2,2,2,2]; // 每维度2道
  for (let d = 0; d < 4; d++) {
    const dimTfs = questionBank.tf.filter(q => q.dim === d);
    const picked = shuffle(dimTfs).slice(0, tfPerDim[d]);
    tfSelected.push(...picked.map(q => ({...q, realId: q.id + '_' + Date.now()})));
  }
  tfSelected = shuffle(tfSelected).slice(0, tfCnt);
  
  // 排序题：随机选1道
  const sortPicked = shuffle(questionBank.sort)[0];
  const sortSelected = [{...sortPicked, realId: sortPicked.id + '_' + Date.now()}];
  
  // 合并并标记题型
  const allQuestions = [
    ...choiceSelected.map(q => ({...q, qType: 'choice'})),
    ...tfSelected.map(q => ({...q, qType: 'tf'})),
    ...sortSelected.map(q => ({...q, qType: 'sort'}))
  ];
  
  return shuffle(allQuestions);
}

// ============ 计算结果 ============
function calculateResult() {
  let dimTagCounts = [{}, {}, {}, {}];
  
  state.questions.forEach(q => {
    const ans = state.answers[q.realId];
    if (ans === undefined) return;
    
    if (q.qType === 'choice') {
      const tag = q.tags[ans];
      if (!dimTagCounts[q.dim][tag]) dimTagCounts[q.dim][tag] = 0;
      dimTagCounts[q.dim][tag]++;
    } else if (q.qType === 'tf') {
      const tag = q.tags[0];
      if (!dimTagCounts[q.dim][tag]) dimTagCounts[q.dim][tag] = 0;
      dimTagCounts[q.dim][tag]++;
    } else if (q.qType === 'sort') {
      const topTag = q.tags[ans[0]];
      if (!dimTagCounts[q.dim][topTag]) dimTagCounts[q.dim][topTag] = 0;
      dimTagCounts[q.dim][topTag]++;
    }
  });
  
  // 计算各维度能力百分比
  let pcts = [75, 75, 75, 75];
  let dimMainTags = ['', '', '', ''];
  
  for (let d = 0; d < 4; d++) {
    const tags = dimTagCounts[d];
    const total = Object.values(tags).reduce((a, b) => a + b, 0);
    if (total > 0) {
      const mainTag = Object.entries(tags).sort((a, b) => b[1] - a[1])[0][0];
      dimMainTags[d] = mainTag;
      const consistency = Object.values(tags).reduce((max, v) => Math.max(max, v), 0) / total;
      pcts[d] = Math.round(70 + consistency * 28);
    }
  }
  
  // 确定主类型
  const maxDim = pcts.indexOf(Math.max(...pcts));
  const minDim = pcts.indexOf(Math.min(...pcts));
  
  let typeKey;
  if (pcts.every(p => p >= 82)) {
    typeKey = '全栈型';
  } else if (pcts.every(p => p < 72)) {
    typeKey = '璞玉型';
  } else {
    const typeMap = {
      0: '思想家型',
      1: '表达者型',
      2: '协作大师型',
      3: '创意家型'
    };
    typeKey = typeMap[maxDim];
  }
  
  const total = Math.round(80 + pcts.reduce((a, b) => a + b, 0) / 400 * 12);
  
  state.result = {
    type: typeKey,
    total: Math.min(98, total),
    pcts,
    dimMainTags
  };
}

      <div class="sort-hint">📌 点击↑↓调整顺序，最重要的排第1位</div>
      <button class="sort-confirm-btn" onclick="confirmSort()">确认排序 →</button>
    `;
  }
  
  app.innerHTML = `
    <div class="top-bar">
      <div class="logo">🧠 AI思维测试</div>
      <div class="step-badge">${state.current + 1}/${state.questions.length}</div>
    </div>
    
    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-thumb" style="width: ${progress}%"></div>
      </div>
      <div class="progress-dots">
        ${state.questions.map((_, idx) => `
          <div class="p-dot ${idx < state.current ? 'done' : ''} ${idx === state.current ? 'active' : ''}"></div>
        `).join('')}
      </div>
    </div>
    
    <div class="question-section">
      <div class="question-card">
        <div class="question-meta">
          <span class="q-type-tag">${q.qType === 'choice' ? '选择题' : q.qType === 'tf' ? '判断题' : '排序题'}</span>
          <span class="q-dim">${dims[q.dim]}</span>
        </div>
        <div class="question-text">${q.text}</div>
        ${bodyHtml}
      </div>
      
      <div class="nav-row">
        <button class="nav-btn nav-prev" ${state.current===0?'disabled':''} onclick="prevQ()">← 上一题</button>
        ${isLastQ ? 
          `<button class="nav-btn nav-next" onclick="submitTest()">查看结果 →</button>` :
          `<button class="nav-btn nav-next" onclick="nextQ()">下一题 →</button>`
        }
      </div>
    </div>
  `;
}

function moveSortItem(pos, direction) {
  const q = state.questions[state.current];
  const order = state.answers[q.realId] !== undefined ? [...state.answers[q.realId]] : [0,1,2,3];
  const newPos = pos + direction;
  if (newPos < 0 || newPos >= order.length) return;
  
  [order[pos], order[newPos]] = [order[newPos], order[pos]];
  state.answers[q.realId] = order;
  saveState();
  
  const list = document.getElementById('sortList');
  if (list) {
    list.innerHTML = order.map((itemIdx, position) => `
      <div class="sort-item" data-pos="${position}">
        <div class="sort-num">${position + 1}</div>
        <div class="sort-text">${q.items[itemIdx]}</div>
        <div class="sort-btns">
          <button class="sort-btn" onclick="moveSortItem(${position}, -1)" ${position === 0 ? 'disabled' : ''}>↑</button>
          <button class="sort-btn" onclick="moveSortItem(${position}, 1)" ${position === order.length - 1 ? 'disabled' : ''}>↓</button>
        </div>
      </div>
    `).join('');
  }
}

function confirmSort() {
  const q = state.questions[state.current];
  if (state.answers[q.realId] === undefined) {
    state.answers[q.realId] = [0,1,2,3];
    saveState();
  }
  
  showToast('已保存');
  
  setTimeout(() => {
    if (state.current < state.questions.length - 1) {
      nextQ();
    } else {
      render();
    }
  }, 500);
}

function selectOption(idx) {
  const q = state.questions[state.current];
  state.answers[q.realId] = idx;
  saveState();
  
  if (q.qType === 'tf') {
    document.querySelectorAll('.tf-btn').forEach(el => el.classList.remove('selected'));
    document.querySelectorAll('.tf-btn')[idx].classList.add('selected');
  } else {
    document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
    event.currentTarget.classList.add('selected');
  }
  
  setTimeout(() => {
    if (state.current < state.questions.length - 1) {
      nextQ();
    } else {
      render();
    }
  }, 300);
}

function nextQ() {
  if (state.current < state.questions.length - 1) {
    state.current++;
    saveState();
    render();
  }
}

function prevQ() {
  if (state.current > 0) {
    state.current--;
    saveState();
    render();
  }
}

function submitTest() {
  const unanswered = state.questions.filter(q => {
    if (q.qType === 'sort') {
      return state.answers[q.realId] === undefined;
    }
    return state.answers[q.realId] === undefined;
  });
  
  if (unanswered.length > 0) {
    showToast(`还有 ${unanswered.length} 题未作答`);
    const firstUnanswered = state.questions.findIndex(q => state.answers[q.realId] === undefined);
    if (firstUnanswered !== -1) {
      state.current = firstUnanswered;
      render();
    }
    return;
  }
  
  calculateResult();
  state.view = 'result';
  state.completed = true;
  saveHistory([{ type:state.result.type, score:state.result.total, date:new Date().toLocaleDateString('zh-CN') }, ...getHistory()].slice(0,10));
  saveState();
  render();
}

function renderResult(app) {
  const r = state.result;
  const t = types[r.type];
  
  const showUnlock = !FREEUnlock && !state.unlocked;
  
  app.innerHTML = `
    <div class="top-bar">
      <div class="logo">🧠 AI思维测试</div>
      <div class="step-badge">已完成</div>
    </div>
    
    <div class="result-card">
      <div class="result-type-icon">${t.icon}</div>
      <div class="result-type-name">${r.type}</div>
      <div class="result-type-en">${t.en}</div>
      <div class="result-desc">${showUnlock ? '解锁后查看完整结果...' : t.desc}</div>
      ${!showUnlock ? `<div class="result-score">综合评分 <span>${r.total}</span> 分</div>` : ''}
    </div>
    
    ${!showUnlock ? `
    <div class="ability-list">
      ${r.pcts.map((pct, i) => `
        <div class="ability-item">
          <div class="ability-icon">${['🔮','💬','🤖','✨'][i]}</div>
          <div class="ability-info">
            <div class="ability-name">${dimNames[i]}</div>
            <div class="ability-bar">
              <div class="ability-fill" style="width:${pct}%;background:${dimColors[i]}"></div>
            </div>
          </div>
          <div class="ability-pct">${pct}%</div>
        </div>
      `).join('')}
    </div>
    
    <div class="super-section">
      <div class="super-label">核心优势</div>
      <div class="super-text">${t.super}</div>
    </div>
    
    <div class="result-section">
      <h3>你的优势</h3>
      ${t.advantage.map(a => `<div class="advantage-item">✓ ${a}</div>`).join('')}
    </div>
    
    <div class="result-section">
      <h3>成长建议</h3>
      ${t.suggest.map(s => `<div class="suggest-item">→ ${s}</div>`).join('')}
    </div>
    
    <div class="share-card">
      <div class="share-title">📤 生成你的专属分享图</div>
      <canvas id="shareCanvas" class="share-canvas" width="560" height="800"></canvas>
      <div class="action-btns">
        <button class="action-btn btn-share" onclick="downloadShare()">下载图片</button>
        <button class="action-btn btn-restart" onclick="restartTest()">重新测试</button>
      </div>
    </div>
    ` : `
    <div class="code-section">
      <div class="code-title">🔑 输入卡密解锁完整结果</div>
      <input type="text" class="code-input" id="codeInput" placeholder="输入卡密" maxlength="10">
      <button class="code-btn" onclick="verifyCode()">解锁</button>
      <p style="font-size:11px;color:#64748b;margin-top:10px;">${FREEUnlock ? '完整结果已解锁' : `解锁费用 ${UNLOCK_PRICE}，请联系获取卡密`}</p>
    </div>
    `}
    
    ${showUnlock ? `
    <div class="unlock-overlay" id="unlockOverlay">
      <div class="unlock-box">
        <div class="unlock-icon">🔒</div>
        <div class="unlock-title">解锁完整结果</div>
        <div class="unlock-desc">支付 ${UNLOCK_PRICE} 解锁<br>完整分析报告 + 分享图片</div>
        <div class="unlock-price">${UNLOCK_PRICE}</div>
        <button class="unlock-btn" onclick="showPay()">扫码支付</button>
        <button class="unlock-btn-secondary" onclick="state.unlocked=true;render();">已有卡密？输入卡密</button>
      </div>
    </div>
    ` : ''}
  `;
  
  if (!showUnlock) {
    setTimeout(drawShareCard, 100);
  }
}

function drawShareCard() {
  const canvas = document.getElementById('shareCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const r = state.result;
  const t = types[r.type];
  
  // 背景
  ctx.fillStyle = '#0a0a14';
  ctx.fillRect(0, 0, 560, 800);
  
  // 渐变装饰
  const grd = ctx.createRadialGradient(280, 200, 0, 280, 200, 300);
  grd.addColorStop(0, 'rgba(99,102,241,0.3)');
  grd.addColorStop(1, 'transparent');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, 560, 800);
  
  // 图标
  ctx.font = '80px serif';
  ctx.textAlign = 'center';
  ctx.fillText(t.icon, 280, 140);
  
  // 标题
  ctx.font = 'bold 36px sans-serif';
  ctx.fillStyle = '#a78bfa';
  ctx.fillText('AI思维测试', 280, 210);
  
  // 类型名
  ctx.font = 'bold 42px sans-serif';
  ctx.fillStyle = '#f1f5f9';
  ctx.fillText(r.type, 280, 290);
  
  // 英文名
  ctx.font = '18px sans-serif';
  ctx.fillStyle = '#64748b';
  ctx.fillText(t.en, 280, 330);
  
  // 分数
  ctx.font = 'bold 64px sans-serif';
  ctx.fillStyle = '#818cf8';
  ctx.fillText(r.total + ' 分', 280, 420);
  
  // 雷达图
  const cx = 280, cy = 560, r2 = 100;
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 1;
  for (let i = 1; i <= 4; i++) {
    ctx.beginPath();
    ctx.arc(cx, cy, r2 * i / 4, 0, Math.PI * 2);
    ctx.stroke();
  }
  for (let i = 0; i < 4; i++) {
    const angle = -Math.PI / 2 + i * Math.PI / 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(angle) * r2, cy + Math.sin(angle) * r2);
    ctx.stroke();
  }
  
  // 雷达图数据
  const colors = ['#6366f1','#a78bfa','#10b981','#f59e0b'];
  ctx.beginPath();
  r.pcts.forEach((pct, i) => {
    const angle = -Math.PI / 2 + i * Math.PI / 2;
    const dist = pct / 100 * r2;
    const x = cx + Math.cos(angle) * dist;
    const y = cy + Math.sin(angle) * dist;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.closePath();
  ctx.fillStyle = 'rgba(99,102,241,0.3)';
  ctx.fill();
  ctx.strokeStyle = '#6366f1';
  ctx.lineWidth = 2;
  ctx.stroke();
  
  // 维度标签
  ctx.font = '14px sans-serif';
  ctx.fillStyle = '#94a3b8';
  ctx.textAlign = 'center';
  r.pcts.forEach((pct, i) => {
    const angle = -Math.PI / 2 + i * Math.PI / 2;
    const x = cx + Math.cos(angle) * (r2 + 25);
    const y = cy + Math.sin(angle) * (r2 + 25);
    ctx.fillText(`${['逻辑','表达','协作','创意'][i]} ${pct}%`, x, y);
  });
  
  // 二维码提示
  ctx.font = '12px sans-serif';
  ctx.fillStyle = '#475569';
  ctx.fillText('扫码测试你的AI思维', 280, 750);
  ctx.fillText('czxcyy.github.io/ai', 280, 775);
}

function downloadShare() {
  const canvas = document.getElementById('shareCanvas');
  if (!canvas) return;
  const link = document.createElement('a');
  link.download = 'AI思维测试-' + state.result.type + '.png';
  link.href = canvas.toDataURL();
  link.click();
}

function restartTest() {
  localStorage.removeItem('aimind_s');
  state = { view:'home', current:0, questions:[], answers:{}, result:null, completed:false, unlocked: FREEUnlock };
  render();
}

function delHistory(date) {
  const h = getHistory().filter(x => x.date !== date);
  saveHistory(h);
  render();
}

function showPay() {
  alert('请扫码支付 ' + UNLOCK_PRICE + '，支付后联系客服获取卡密');
}

function verifyCode() {
  const code = document.getElementById('codeInput').value.trim().toUpperCase();
  if (!code) return;
  
  if (CARD_CODES.includes(code) || hasCard(code)) {
    addCard(code);
    state.unlocked = true;
    showToast('解锁成功！');
    render();
  } else {
    showToast('卡密无效，请重新输入');
  }
}

// ============ 启动 ============
function startTest() {
  if (!getPrivacy()) {
    document.getElementById('privacyModal').classList.remove('hidden');
    return;
  }
  
  state = {
    view: 'question',
    current: 0,
    questions: generateTest(),
    answers: {},
    result: null,
    completed: false,
    unlocked: FREEUnlock
  };
  saveState();
  render();
}

function acceptPrivacy() {
  setPrivacy();
  document.getElementById('privacyModal').classList.add('hidden');
  startTest();
}

function declinePrivacy() {
  setDecline();
  document.getElementById('privacyModal').classList.add('hidden');
}

function showToast(msg) {
  const old = document.querySelector('.toast');
  if (old) old.remove();
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2000);
}

// 初始化
document.addEventListener('DOMContentLoaded', () => {
  if (loadState()) {
    // 恢复状态
  }
  render();
});
</script>
</body>
</html>
