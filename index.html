<!DOCTYPE html>

  <style>

    .hero p { color: #94a3b8; font-size: 15px; line-height: 1.7; }
    
    .intro-card { background: rgba(30,41,59,0.5); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.07); border-radius: 20px; padding: 22px; margin-bottom: 20px; }

    .btn-cancel { background: rgba(255,255,255,0.07); color: #94a3b8; }

    .question-card { background: rgba(30,41,59,0.45); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.06); border-radius: 20px; padding: 22px; margin-bottom: 20px; }

    .question-hint { font-size: 12px; color: #64748b; margin-top: 10px; font-style: italic; }
    
    .tf-options { display: flex; gap: 10px; }
    .tf-btn { flex: 1; padding: 18px 12px; background: rgba(15,23,42,0.5); border: 2px solid rgba(255,255,255,0.08); border-radius: 14px; text-align: center; cursor: pointer; transition: all 0.25s; }
    .tf-btn:hover { border-color: rgba(99,102,241,0.4); background: rgba(99,102,241,0.06); }

    .tf-icon { font-size: 28px; margin-bottom: 6px; display: block; }

    .option:hover { border-color: rgba(99,102,241,0.35); background: rgba(99,102,241,0.04); }
    .option.selected { border-color: #6366f1; background: rgba(99,102,241,0.1); }
    .opt-radio { width: 20px; height: 20px; border: 2px solid #475569; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .option.selected .opt-radio { border-color: #6366f1; background: #6366f1; }

    .opt-label { width: 24px; height: 24px; background: rgba(255,255,255,0.05); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #64748b; flex-shrink: 0; }
    .option.selected .opt-label { background: rgba(99,102,241,0.2); color: #818cf8; }

    /* 排序题 - 移动端适配 */
    .sort-items { display: flex; flex-direction: column; gap: 8px; }
    .sort-item { display: flex; align-items: center; gap: 10px; padding: 14px 12px; background: rgba(15,23,42,0.5); border: 2px solid rgba(255,255,255,0.06); border-radius: 12px; transition: all 0.2s; user-select: none; }
    .sort-item:active { background: rgba(99,102,241,0.08); }
    .sort-num { width: 28px; height: 28px; background: rgba(99,102,241,0.15); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #818cf8; flex-shrink: 0; }
    .sort-text { font-size: 14px; flex: 1; line-height: 1.4; }
    .sort-btns { display: flex; flex-direction: column; gap: 4px; }

    .sort-btn:hover { background: rgba(99,102,241,0.3); }
    .sort-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .sort-hint { font-size: 12px; color: #64748b; margin-top: 12px; }
    .sort-confirm-btn { display: block; width: 100%; margin-top: 16px; padding: 14px; background: linear-gradient(135deg, #6366f1, #7c3aed); border: none; border-radius: 12px; font-size: 14px; font-weight: 600; color: white; cursor: pointer; }
    
    .nav-row { display: flex; gap: 10px; margin-top: 20px; }
    .nav-btn { flex: 1; padding: 14px; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.25s; }
    .nav-prev { background: rgba(255,255,255,0.07); color: #94a3b8; }
    .nav-prev:hover { background: rgba(255,255,255,0.1); }
    .nav-prev:disabled { opacity: 0.3; cursor: not-allowed; }
    .nav-next { background: linear-gradient(135deg, #6366f1, #7c3aed); color: white; }
    .nav-next:hover { opacity: 0.9; }
    
    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #10b981; color: white; padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 500; z-index: 2000; animation: toastIn 0.3s ease; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    
    /* 结果页 */
    .result-card { background: rgba(30,41,59,0.5); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.07); border-radius: 22px; padding: 26px; margin-bottom: 20px; text-align: center; }
    .result-type-icon { font-size: 72px; margin-bottom: 12px; }
    .result-type-name { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, #6366f1, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 4px; }
    .result-type-en { font-size: 13px; color: #64748b; margin-bottom: 16px; }
    .result-desc { font-size: 14px; color: #94a3b8; line-height: 1.8; margin-bottom: 20px; }
    .result-score { display: inline-flex; align-items: center; gap: 8px; background: rgba(99,102,241,0.1); padding: 8px 18px; border-radius: 20px; font-size: 13px; color: #a5b4fc; }
    .result-score span { font-size: 20px; font-weight: 700; color: #818cf8; }
    
    .radar-card { background: rgba(30,41,59,0.5); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.07); border-radius: 22px; padding: 26px; margin-bottom: 20px; }
    .radar-title { font-size: 13px; color: #64748b; margin-bottom: 16px; text-align: center; }
    .radar-canvas { width: 100%; max-width: 280px; margin: 0 auto; display: block; }
    .radar-legend { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #94a3b8; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
    
    .ability-list { margin-top: 16px; }
    .ability-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .ability-item:last-child { border-bottom: none; }
    .ability-icon { font-size: 18px; }
    .ability-info { flex: 1; }
    .ability-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .ability-bar { height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
    .ability-fill { height: 100%; border-radius: 2px; transition: width 1s ease; }
    .ability-pct { font-size: 12px; color: #64748b; width: 35px; text-align: right; }
    
    .super-section { background: rgba(99,102,241,0.06); border: 1px solid rgba(99,102,241,0.12); border-radius: 16px; padding: 18px; margin-bottom: 18px; }
    .super-label { font-size: 11px; color: #818cf8; margin-bottom: 6px; font-weight: 600; }
    .super-text { font-size: 13px; color: #a5b4fc; line-height: 1.6; }
    
    .feature-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .feature-tag { background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(167,139,250,0.2)); border: 1px solid rgba(99,102,241,0.3); border-radius: 20px; padding: 6px 14px; font-size: 12px; color: #a5b4fc; }
    
    .person-model { background: linear-gradient(135deg, rgba(245,158,11,0.1), rgba(251,191,36,0.05)); border: 1px solid rgba(245,158,11,0.2); border-radius: 12px; padding: 16px; font-size: 14px; color: #fcd34d; line-height: 1.7; text-align: center; margin-top: 8px; }
    
    .desc-text { font-size: 13px; color: #94a3b8; line-height: 1.8; }
    
    .career-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .career-tag { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.15); border-radius: 8px; padding: 6px 12px; font-size: 12px; color: #6ee7b7; }
    
    .result-section { margin-top: 20px; }
    .result-section h3 { font-size: 13px; color: #94a3b8; margin-bottom: 12px; font-weight: 500; }
    
    .advantage-item { background: rgba(16,185,129,0.06); border: 1px solid rgba(16,185,129,0.1); border-radius: 12px; padding: 14px; margin-bottom: 10px; font-size: 13px; line-height: 1.6; color: #6ee7b7; }
    .suggest-item { background: rgba(245,158,11,0.06); border: 1px solid rgba(245,158,11,0.1); border-radius: 12px; padding: 14px; margin-bottom: 10px; font-size: 13px; line-height: 1.6; color: #fcd34d; }
    
    .share-card { background: rgba(30,41,59,0.5); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.07); border-radius: 18px; padding: 18px; margin-bottom: 16px; text-align: center; }
    .share-title { font-size: 12px; color: #64748b; margin-bottom: 12px; }
    .share-canvas { width: 100%; max-width: 280px; margin: 0 auto; border-radius: 12px; }
    
    .action-btns { display: flex; gap: 10px; margin-top: 16px; }
    .action-btn { flex: 1; padding: 14px; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.25s; }
    .btn-share { background: linear-gradient(135deg, #10b981, #059669); color: white; }
    .btn-restart { background: rgba(255,255,255,0.07); color: #94a3b8; }
    
    .code-section { background: rgba(99,102,241,0.08); border: 1px solid rgba(99,102,241,0.15); border-radius: 14px; padding: 16px; margin-top: 18px; }
    .code-title { font-size: 12px; color: #818cf8; margin-bottom: 10px; font-weight: 600; }
    .code-input { width: 100%; padding: 12px; background: rgba(15,23,42,0.5); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; color: #f1f5f9; font-size: 14px; text-align: center; letter-spacing: 2px; margin-bottom: 10px; box-sizing: border-box; }
    .code-input:focus { outline: none; border-color: #6366f1; }
    .code-btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #6366f1, #7c3aed); border: none; border-radius: 10px; color: white; font-size: 13px; font-weight: 600; cursor: pointer; }

    .unlock-box { background: #1e293b; border: 1px solid rgba(255,255,255,0.1); border-radius: 22px; padding: 28px; max-width: 380px; width: 100%; text-align: center; }

<body>
  <div class="bg-gradient"></div>
  <div class="container" id="app"></div>


<script>
// ============ 题库 ============
// dim: 0=逻辑 1=表达 2=AI协作 3=创意
// qType: choice/tf/sort
// 每道题都有 tags 用于类型判定

const questionBank = {
  // ========== 选择题库（12道，每维度3道） ==========
  // 设计原则：情境具体、选项差异大、无重复模式
  choice: [
    // --- 逻辑推理 (dim:0) ---
    {
      id:'c1', dim:0,
      text:'周一早上，你需要向团队同步一个重要决策，你会？',
      options:[
        '先整理好数据、结论、建议，发邮件正文',
        '拉个会，边讲边讨论',
        '先和几个关键人物私聊统一意见',
        '直接定，通知大家执行就好'
      ],
      tags:['数据驱动','会议型','预热型','权威型']
    },
    {
      id:'c2', dim:0,
      text:'买衣服时，A店销量很高但差评多，B店销量一般但全是好评，你会？',
      options:[
        '仔细对比两个店的评价内容',
        '选A店，买的人多应该不错',
        '选B店，好评更真实',
        '两家都不买，再看看其他店'
      ],
      tags:['分析型','从众型','口碑型','挑剔型']
    },
    {
      id:'c3', dim:0,
      text:'旅行前做攻略，你更倾向于？',
      options:[
        '精确到每小时的详细计划',
        '只定下必去的几个点，其他随缘',
        '看一堆别人的攻略，然后选一个跟着走',
        '不做计划，到当地再说'
      ],
      tags:['计划周密','抓大放小','参考型','随性型']
    },
    {
      id:'c4', dim:0,
      text:'你家的书桌整理方式是？',
      options:[
        '按类别分类，排列整齐',
        '随手放，用的时候能找到就行',
        '定期全部清空重新整理',
        '从不整理，需要时再找'
      ],
      tags:['条理型','实用型','周期型','随意型']
    },
    // --- 语言表达 (dim:1) ---
    {
      id:'c5', dim:1,
      text:'在工作群里，你通常属于哪种类型的消息发送者？',
      options:[
        '重要事项才发，字少事大',
        '有感而发，偶尔水群',
        '转发有价值的行业资讯',
        '基本只看不说，潜水围观'
      ],
      tags:['精准型','活跃型','价值型','沉默型']
    },
    {
      id:'c6', dim:1,
      text:'朋友向你倾诉烦恼，你更常见的反应是？',
      options:[
        '帮他分析问题，给出解决方案',
        '陪他一起吐槽，释放情绪',
        '说点别的，转移注意力',
        '安静听着，让他自己说够'
      ],
      tags:['顾问型','陪伴型','分散型','倾听型']
    },
    {
      id:'c7', dim:1,
      text:'写工作汇报时，你更关注？',
      options:[
        '用数据展示成果，有说服力',
        '说清楚问题和解决方案',
        '突出自己的贡献和亮点',
        '简洁明了，一页纸搞定'
      ],
      tags:['数据型','问题型','成就型','精炼型']
    },
    {
      id:'c8', dim:1,
      text:'你最喜欢的文章风格是？',
      options:[
        '观点鲜明，逻辑严密',
        '故事性强，有画面感',
        '金句频出，忍不住截图',

// ============ 工具函数 ============
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getHistory() {
  try { return JSON.parse(localStorage.getItem('aimind_h') || '[]'); }
  catch { return []; }
}

function saveHistory(h) {
  localStorage.setItem('aimind_h', JSON.stringify(h));
}

function saveState() {
  localStorage.setItem('aimind_s', JSON.stringify({
    view: state.view,
    current: state.current,
    questions: state.questions,
    answers: state.answers,
    completed: state.completed,
    result: state.result
  }));
}

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem('aimind_s'));
    if (s && s.questions && s.questions.length > 0) {
      state.view = s.view;
      state.current = s.current;
      state.questions = s.questions;
      state.answers = s.answers || {};
      state.completed = s.completed;
      state.result = s.result;
      return true;
    }
  } catch {}
  return false;
}

function getPrivacy() {
  return localStorage.getItem('aimind_privacy') === '1';
}
function setPrivacy() {
  localStorage.setItem('aimind_privacy', '1');
}
function setDecline() {
  localStorage.setItem('aimind_privacy', '0');
}

function getCards() {
  try { return JSON.parse(localStorage.getItem(CARD_KEY) || '[]'); }
  catch { return []; }
}
function addCard(code) {
  const cards = getCards();
  if (!cards.includes(code)) {
    cards.push(code);
    localStorage.setItem(CARD_KEY, JSON.stringify(cards));
  }
}
function hasCard(code) {
  return getCards().includes(code);
}

    dimCount[d]++;
  }
  
  // 再随机选剩下的
  const remainingChoices = questionBank.choice.filter(q => !choiceSelected.find(s => s.id === q.id));
  const extraChoices = shuffle(remainingChoices).slice(0, choiceCnt - 4);
  extraChoices.forEach(q => {
    choiceSelected.push({...q, realId: q.id + '_' + Date.now()});
    dimCount[q.dim]++;
  });
  
  // 打乱顺序
  choiceSelected = shuffle(choiceSelected);
  
  // 判断题：每维度选一些
  let tfSelected = [];
  const tfPerDim = [2,2,2,2]; // 每维度2道
  for (let d = 0; d < 4; d++) {
    const dimTfs = questionBank.tf.filter(q => q.dim === d);
    const picked = shuffle(dimTfs).slice(0, tfPerDim[d]);
    tfSelected.push(...picked.map(q => ({...q, realId: q.id + '_' + Date.now()})));
  }
  tfSelected = shuffle(tfSelected).slice(0, tfCnt);
  
  // 排序题：随机选1道
  const sortPicked = shuffle(questionBank.sort)[0];
  const sortSelected = [{...sortPicked, realId: sortPicked.id + '_' + Date.now()}];
  
  // 合并并标记题型
  const allQuestions = [
    ...choiceSelected.map(q => ({...q, qType: 'choice'})),
    ...tfSelected.map(q => ({...q, qType: 'tf'})),
    ...sortSelected.map(q => ({...q, qType: 'sort'}))
  ];
  
  return shuffle(allQuestions);
}

// ============ 计算结果 ============
function calculateResult() {
  let dimTagCounts = [{}, {}, {}, {}];
  
  state.questions.forEach(q => {
    const ans = state.answers[q.realId];
    if (ans === undefined) return;
    
    if (q.qType === 'choice') {
      const tag = q.tags[ans];
      if (!dimTagCounts[q.dim][tag]) dimTagCounts[q.dim][tag] = 0;
      dimTagCounts[q.dim][tag]++;
    } else if (q.qType === 'tf') {
      const tag = q.tags[0];
      if (!dimTagCounts[q.dim][tag]) dimTagCounts[q.dim][tag] = 0;
      dimTagCounts[q.dim][tag]++;
    } else if (q.qType === 'sort') {
      const topTag = q.tags[ans[0]];
      if (!dimTagCounts[q.dim][topTag]) dimTagCounts[q.dim][topTag] = 0;
      dimTagCounts[q.dim][topTag]++;
    }
  });
  
  // 计算各维度能力百分比
  let pcts = [75, 75, 75, 75];
  let dimMainTags = ['', '', '', ''];
  
  for (let d = 0; d < 4; d++) {
    const tags = dimTagCounts[d];
    const total = Object.values(tags).reduce((a, b) => a + b, 0);
    if (total > 0) {
      const mainTag = Object.entries(tags).sort((a, b) => b[1] - a[1])[0][0];
      dimMainTags[d] = mainTag;
      const consistency = Object.values(tags).reduce((max, v) => Math.max(max, v), 0) / total;
      pcts[d] = Math.round(70 + consistency * 28);
    }
  }
  
  // 确定主类型（8种）
  const maxDim = pcts.indexOf(Math.max(...pcts));
  const minDim = pcts.indexOf(Math.min(...pcts));
  const maxPct = Math.max(...pcts);
  const minPct = Math.min(...pcts);
  const diff = maxPct - minPct;
  
  let typeKey;
  if (pcts.every(p => p >= 82)) {
    typeKey = '全栈型';
  } else if (pcts.every(p => p < 72)) {
    typeKey = '潜力股型';
  } else if (diff < 8) {
    // 差距小但非全低/全高 → 根据维度组合判断
    const sum03 = pcts[0] + pcts[3]; // 逻辑+创意
    const sum12 = pcts[1] + pcts[2]; // 表达+AI
    if (sum03 > sum12 + 6) {
      typeKey = '执行者型';
    } else if (sum12 > sum03 + 6) {
      typeKey = '协调者型';
    } else {
      // 四个都差不多，按最高维度
      const typeMap = { 0:'思想家型', 1:'表达者型', 2:'AI指挥官型', 3:'创意家型' };
      typeKey = typeMap[maxDim];
    }
  } else {
    // 有明显主导维度
    const typeMap = { 0:'思想家型', 1:'表达者型', 2:'AI指挥官型', 3:'创意家型' };
    // 检查是否有组合倾向
    if (diff >= 8 && diff < 15) {
      // 有一定差距但不够大，考虑组合
      const otherHigh = pcts.filter((p, i) => i !== maxDim).sort((a, b) => b - a)[0];
      if (maxPct - otherHigh < 10) {
        // 第二名很接近，考虑组合型
        if ((maxDim === 0 || maxDim === 3) && otherHigh === (maxDim === 0 ? 3 : 0)) {
          typeKey = '执行者型';
        } else if ((maxDim === 1 || maxDim === 2) && otherHigh === (maxDim === 1 ? 2 : 1)) {
          typeKey = '协调者型';
        } else {
          typeKey = typeMap[maxDim];
        }
      } else {
        typeKey = typeMap[maxDim];
      }
    } else {
      typeKey = typeMap[maxDim];
    }
  }
  
  const total = Math.round(80 + pcts.reduce((a, b) => a + b, 0) / 400 * 12);
  
  state.result = {
    type: typeKey,
    total: Math.min(98, total),
    pcts,
    dimMainTags
  };
}

function moveSortItem(pos, direction) {
  const q = state.questions[state.current];
  const order = state.answers[q.realId] !== undefined ? [...state.answers[q.realId]] : [0,1,2,3];
  const newPos = pos + direction;
  if (newPos < 0 || newPos >= order.length) return;
  
  [order[pos], order[newPos]] = [order[newPos], order[pos]];
  state.answers[q.realId] = order;
  saveState();
  
  const list = document.getElementById('sortList');
  if (list) {
    list.innerHTML = order.map((itemIdx, position) => `
      <div class="sort-item" data-pos="${position}">
        <div class="sort-num">${position + 1}</div>
        <div class="sort-text">${q.items[itemIdx]}</div>
        <div class="sort-btns">
          <button class="sort-btn" onclick="moveSortItem(${position}, -1)" ${position === 0 ? 'disabled' : ''}>↑</button>
          <button class="sort-btn" onclick="moveSortItem(${position}, 1)" ${position === order.length - 1 ? 'disabled' : ''}>↓</button>
        </div>
      </div>
    `).join('');
  }
}

function confirmSort() {
  const q = state.questions[state.current];
  if (state.answers[q.realId] === undefined) {
    state.answers[q.realId] = [0,1,2,3];
    saveState();
  }
  
  showToast('已保存');
  
  setTimeout(() => {
    if (state.current < state.questions.length - 1) {
      nextQ();
    } else {
      render();
    }
  }, 500);
}

function selectOption(idx) {
  const q = state.questions[state.current];
  state.answers[q.realId] = idx;
  saveState();
  
  if (q.qType === 'tf') {
    document.querySelectorAll('.tf-btn').forEach(el => el.classList.remove('selected'));
    document.querySelectorAll('.tf-btn')[idx].classList.add('selected');
  } else {
    document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
    event.currentTarget.classList.add('selected');
  }
  
  setTimeout(() => {
    if (state.current < state.questions.length - 1) {
      nextQ();
    } else {
      render();
    }
  }, 300);
}

function nextQ() {
  if (state.current < state.questions.length - 1) {
    state.current++;
    saveState();
    render();
  }
}

function prevQ() {
  if (state.current > 0) {
    state.current--;
    saveState();
    render();
  }
}

function submitTest() {
  const unanswered = state.questions.filter(q => {
    if (q.qType === 'sort') {
      return state.answers[q.realId] === undefined;
    }
    return state.answers[q.realId] === undefined;
  });
  
  if (unanswered.length > 0) {
    showToast(`还有 ${unanswered.length} 题未作答`);
    const firstUnanswered = state.questions.findIndex(q => state.answers[q.realId] === undefined);
    if (firstUnanswered !== -1) {
      state.current = firstUnanswered;
      render();
    }
    return;
  }
  
  calculateResult();
  state.view = 'result';
  state.completed = true;
  saveHistory([{ type:state.result.type, score:state.result.total, date:new Date().toLocaleDateString('zh-CN') }, ...getHistory()].slice(0,10));
  saveState();
  render();
}

function drawShareCard() {
  const canvas = document.getElementById('shareCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const r = state.result;
  const t = types[r.type];
  
  // 背景
  ctx.fillStyle = '#0a0a14';
  ctx.fillRect(0, 0, 560, 800);
  
  // 渐变装饰
  const grd = ctx.createRadialGradient(280, 200, 0, 280, 200, 300);
  grd.addColorStop(0, 'rgba(99,102,241,0.3)');
  grd.addColorStop(1, 'transparent');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, 560, 800);
  
  // 图标
  ctx.font = '80px serif';
  ctx.textAlign = 'center';
  ctx.fillText(t.icon, 280, 140);
  
  // 标题
  ctx.font = 'bold 36px sans-serif';
  ctx.fillStyle = '#a78bfa';
  ctx.fillText('AI时代思维测试', 280, 210);
  
  // 类型名
  ctx.font = 'bold 42px sans-serif';
  ctx.fillStyle = '#f1f5f9';
  ctx.fillText(r.type, 280, 290);
  
  // 英文名
  ctx.font = '18px sans-serif';
  ctx.fillStyle = '#64748b';
  ctx.fillText(t.en, 280, 330);
  
  // 分数
  ctx.font = 'bold 48px sans-serif';
  ctx.fillStyle = '#818cf8';
  ctx.fillText(r.total + ' 分', 280, 400);
  
  // 雷达图
  const cx = 280, cy = 560, r2 = 100;
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 1;
  for (let i = 1; i <= 4; i++) {
    ctx.beginPath();
    ctx.arc(cx, cy, r2 * i / 4, 0, Math.PI * 2);
    ctx.stroke();
  }
  for (let i = 0; i < 4; i++) {
    const angle = -Math.PI / 2 + i * Math.PI / 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(angle) * r2, cy + Math.sin(angle) * r2);
    ctx.stroke();
  }
  
  // 雷达图数据
  const colors = ['#6366f1','#a78bfa','#10b981','#f59e0b'];
  ctx.beginPath();
  r.pcts.forEach((pct, i) => {
    const angle = -Math.PI / 2 + i * Math.PI / 2;
    const dist = pct / 100 * r2;
    const x = cx + Math.cos(angle) * dist;
    const y = cy + Math.sin(angle) * dist;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.closePath();
  ctx.fillStyle = 'rgba(99,102,241,0.3)';
  ctx.fill();
  ctx.strokeStyle = '#6366f1';
  ctx.lineWidth = 2;
  ctx.stroke();
  
  // 维度标签
  ctx.font = '14px sans-serif';
  ctx.fillStyle = '#94a3b8';
  ctx.textAlign = 'center';
  r.pcts.forEach((pct, i) => {
    const angle = -Math.PI / 2 + i * Math.PI / 2;
    const x = cx + Math.cos(angle) * (r2 + 25);
    const y = cy + Math.sin(angle) * (r2 + 25);
    ctx.fillText(`${['逻辑','表达','协作','创意'][i]} ${pct}%`, x, y);
  });
  
  // 人物模型
  ctx.font = '15px sans-serif';
  ctx.fillStyle = '#fcd34d';
  ctx.fillText(t.personModel, 280, 450);
  
  // 描述
  ctx.font = '14px sans-serif';
  ctx.fillStyle = '#94a3b8';
  ctx.fillText('AI时代，你是什么类型的选手？', 280, 490);
  
  // 核心标签
  ctx.font = '12px sans-serif';
  ctx.fillStyle = '#a5b4fc';
  const tagsText = t.features.join(' · ');
  ctx.fillText(tagsText, 280, 520);
  
  // 二维码提示
  ctx.font = '12px sans-serif';
  ctx.fillStyle = '#475569';
  ctx.fillText('扫码测一测你的AI时代基因', 280, 750);
  ctx.fillText('czxcyy.github.io/ai', 280, 775);
}

function downloadShare() {
  const canvas = document.getElementById('shareCanvas');
  if (!canvas) return;
  const link = document.createElement('a');
  link.download = 'AI时代思维测试-' + state.result.type + '.png';
  link.href = canvas.toDataURL();
  link.click();
}

function restartTest() {
  localStorage.removeItem('aimind_s');
  state = { view:'home', current:0, questions:[], answers:{}, result:null, completed:false, unlocked: FREEUnlock };
  render();
}

function delHistory(date) {
  const h = getHistory().filter(x => x.date !== date);
  saveHistory(h);
  render();
}

function showPay() {
  alert('请扫码支付 ' + UNLOCK_PRICE + '，支付后联系客服获取卡密');
}

function verifyCode() {
  const code = document.getElementById('codeInput').value.trim().toUpperCase();
  if (!code) return;
  
  if (CARD_CODES.includes(code) || hasCard(code)) {
    addCard(code);
    state.unlocked = true;
    showToast('解锁成功！');
    render();
  } else {
    showToast('卡密无效，请重新输入');
  }
}

// ============ 启动 ============
function startTest() {
  // 隐私已同意，直接开始
  
  state = {
    view: 'question',
    current: 0,
    questions: generateTest(),
    answers: {},
    result: null,
    completed: false,
    unlocked: FREEUnlock
  };
  saveState();
  render();
}

function acceptPrivacy() {
  setPrivacy();
  document.getElementById('privacyModal').classList.add('hidden');
  startTest();
}

function declinePrivacy() {
  setDecline();
  document.getElementById('privacyModal').classList.add('hidden');
}

// 初始化
document.addEventListener('DOMContentLoaded', () => {
  if (loadState()) {
    // 恢复状态
  }
  render();
});

function showToast(msg) {
  const old = document.querySelector('.toast');
  if (old) old.remove();
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2000);
}

</script>
